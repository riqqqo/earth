<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Земельные участки — д. Головизнинцы</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .header p {
            opacity: 0.85;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        #map {
            height: 650px;
            flex: 1 1 800px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .charts-panel {
            flex: 1 1 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-box {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .chart-box h3 {
            font-size: 15px;
            margin-bottom: 10px;
            color: #1a5276;
        }

        .chart-box canvas {
            max-height: 250px;
        }

        .table-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow-x: auto;
        }

        .table-box h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #1a5276;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #1a5276;
            color: white;
            padding: 10px 8px;
            text-align: left;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover td {
            background: #eaf2f8;
        }

        td a {
            color: #2980b9;
            text-decoration: none;
        }

        td a:hover {
            text-decoration: underline;
        }

        .btn-detail {
            background: #2980b9;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

        .btn-detail:hover {
            background: #1a5276;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .modal h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a5276;
            padding-right: 30px;
        }

        .modal .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #888;
            line-height: 1;
        }

        .modal .close-btn:hover {
            color: #333;
        }

        .modal .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .modal .detail-label {
            color: #666;
            font-weight: 500;
            flex: 0 0 45%;
        }

        .modal .detail-value {
            color: #333;
            text-align: right;
            flex: 1;
        }

        .modal .detail-links {
            margin-top: 14px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal .detail-links a {
            color: #2980b9;
            text-decoration: none;
            font-size: 14px;
        }

        .modal .detail-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 800px) {
            .row {
                flex-direction: column;
            }

            #map {
                height: 350px;
            }

            .header {
                padding: 16px 16px;
            }

            .header h1 {
                font-size: 18px;
            }

            .header p {
                font-size: 12px;
            }

            .container {
                padding: 12px;
            }

            .chart-box canvas {
                max-height: 200px;
            }
        }

        @media (max-width: 480px) {
            #map {
                height: 280px;
            }

            .header {
                padding: 12px 10px;
            }

            .header h1 {
                font-size: 16px;
            }

            .header p {
                font-size: 11px;
            }

            .container {
                padding: 8px;
            }

            .row {
                gap: 10px;
                margin-bottom: 10px;
            }

            .chart-box {
                padding: 10px;
            }

            .chart-box h3 {
                font-size: 13px;
            }

            .chart-box canvas {
                max-height: 160px;
            }

            .table-box {
                padding: 10px;
            }

            .table-box h3 {
                font-size: 14px;
            }

            table {
                font-size: 10px;
            }

            th {
                padding: 6px 4px;
            }

            td {
                padding: 5px 4px;
            }

            td a,
            .btn-detail {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>📍 Земельные участки — д. Головизнинцы</h1>
        <p>Кировская область, Кирово-Чепецкий район | 10 участков ИЖС</p>
    </div>

    <div class="container">
        <div class="row">
            <div id="map"></div>
            <div class="charts-panel">
                <div class="chart-box">
                    <h3>💰 Цена за сотку (руб.)</h3>
                    <canvas id="chartPricePerSotka"></canvas>
                </div>
                <div class="chart-box">
                    <h3>📊 Цена продавца vs Кадастровая стоимость</h3>
                    <canvas id="chartCompare"></canvas>
                </div>
            </div>
        </div>
        <div class="table-box">
            <h3>📋 Таблица участков</h3>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Кадастровый номер</th>
                        <th>Avito</th>
                        <th>Карта</th>
                        <th>Площадь (сот.)</th>
                        <th>Цена (руб.)</th>
                        <th>Цена/сотка</th>
                        <th>Детальная информация</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        // ===== PARSER: load data from data.md =====
        async function loadPlots() {
            const resp = await fetch('data.md');
            const text = await resp.text();
            const lines = text.split('\n');

            let dataStart = -1;
            for (let i = 0; i < lines.length; i++) {
                if (/^\d+\s*\|/.test(lines[i].trim())) { dataStart = i; break; }
            }
            if (dataStart === -1) return [];

            const plots = [];
            for (let i = dataStart; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!/^\d+\s*\|/.test(line)) continue;
                const cells = line.split('|').map(c => c.trim());
                // [0]=№, [1]=кад, [2]=авито, [3]=пкк, [4]=широта, [5]=долгота, [6]=сот, [7]=цена, [8]=статус, [9]=адрес, [10]=квм, [11]=дата, [12]=кад.стоимость, [13]=категория, [14]=вид использования, [15]=форма собственности, [16]=примечания
                if (cells.length < 17) continue;

                const id = parseInt(cells[0], 10); if (!id) continue;
                const cad = cells[1];
                const avito = cells[2];
                const pmap = cells[3];
                const lat = parseFloat(cells[4]);
                const lng = parseFloat(cells[5]);
                if (!lat || !lng) continue;
                const sot = parseFloat(cells[6]) || 0;
                const price = parseInt(cells[7].replace(/\s/g, ''), 10) || 0;
                const status = cells[8];
                const addr = cells[9];
                const area = cells[10] + ' кв. м';
                const date = cells[11];
                const cadCost = parseInt(cells[12].replace(/\s/g, ''), 10) || 0;
                const category = cells[13] || '';
                const useType = cells[14] || '';
                const ownership = cells[15] || '';
                const note = cells[16] || '';

                plots.push({ id, cad, avito, pmap, lat, lng, sot, price, status, addr, area, date, cadCost, category, useType, ownership, note });
            }
            return plots;
        }

        // ===== MODAL =====
        function openModal(p) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            const pricePerSotka = Math.round(p.price / p.sot);

            content.innerHTML = `
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <h2>Участок №${p.id} — ${p.cad}</h2>
                <div class="detail-row"><span class="detail-label">Статус</span><span class="detail-value">${p.status}</span></div>
                <div class="detail-row"><span class="detail-label">Адрес</span><span class="detail-value">${p.addr}</span></div>
                <div class="detail-row"><span class="detail-label">Уточн. площадь</span><span class="detail-value">${p.area}</span></div>
                <div class="detail-row"><span class="detail-label">Дата присвоения КН</span><span class="detail-value">${p.date}</span></div>
                <div class="detail-row"><span class="detail-label">Кадастровая стоимость</span><span class="detail-value">${p.cadCost.toLocaleString('ru-RU')} ₽</span></div>
                <div class="detail-row"><span class="detail-label">Цена продавца</span><span class="detail-value">${p.price.toLocaleString('ru-RU')} ₽</span></div>
                <div class="detail-row"><span class="detail-label">Цена за сотку</span><span class="detail-value">${pricePerSotka.toLocaleString('ru-RU')} ₽</span></div>
                <div class="detail-row"><span class="detail-label">Категория земель</span><span class="detail-value">${p.category || '—'}</span></div>
                <div class="detail-row"><span class="detail-label">Вид использования</span><span class="detail-value">${p.useType || '—'}</span></div>
                <div class="detail-row"><span class="detail-label">Форма собственности</span><span class="detail-value">${p.ownership || '—'}</span></div>
                <div class="detail-row"><span class="detail-label">Примечания</span><span class="detail-value">${p.note || '—'}</span></div>
                <div class="detail-links">
                    <a href="${p.avito}" target="_blank">📋 Avito</a>
                    <a href="${p.pmap}" target="_blank">🗺️ Кадастровая карта</a>
                </div>
            `;
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeModal();
        });

        // ===== INIT =====
        async function init() {
            const plots = await loadPlots();
            if (!plots.length) { document.body.innerHTML += '<p style="padding:20px;color:red">⚠ Ошибка загрузки данных из data.md</p>'; return; }

            const prices = plots.map(p => p.price);
            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);

            // Make openModal available globally for onclick
            window.openModal = openModal;
            window.closeModal = closeModal;

            function priceColor(price) {
                const t = (price - minPrice) / (maxPrice - minPrice || 1);
                return `hsl(${Math.round(120 * (1 - t))}, 70%, 45%)`;
            }

            // ===== TABLE =====
            const tbody = document.querySelector('#dataTable tbody');
            plots.forEach(p => {
                const pricePerSotka = Math.round(p.price / p.sot);
                const ratio = (p.price / p.cadCost).toFixed(1);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><b>${p.id}</b></td><td>${p.cad}</td><td><a href="${p.avito}" target="_blank">Avito</a></td><td><a href="${p.pmap}" target="_blank">ПКК</a></td><td>${p.sot}</td><td>${p.price.toLocaleString('ru-RU')} ₽</td><td>${pricePerSotka.toLocaleString('ru-RU')} ₽ <small style="color:#888">(×${ratio})</small></td><td><button class="btn-detail" onclick="openModal(plotsData[${p.id - 1}])">Показать</button></td>`;
                tbody.appendChild(tr);
            });

            // Store globally for modal onclick
            window.plotsData = plots;

            // ===== CHARTS =====
            new Chart(document.getElementById('chartPricePerSotka'), {
                type: 'bar',
                data: {
                    labels: plots.map(p => `№${p.id} (${p.sot} сот.)`),
                    datasets: [{
                        label: 'Цена за сотку (руб.)',
                        data: plots.map(p => Math.round(p.price / p.sot)),
                        backgroundColor: plots.map(p => priceColor(p.price)),
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { ticks: { callback: v => Math.round(v).toLocaleString('ru-RU') + ' ₽' } } }
                }
            });

            new Chart(document.getElementById('chartCompare'), {
                type: 'bar',
                data: {
                    labels: plots.map(p => `№${p.id}`),
                    datasets: [
                        { label: 'Цена продавца', data: plots.map(p => p.price), backgroundColor: '#2980b9', borderRadius: 4 },
                        { label: 'Кадастровая стоимость', data: plots.map(p => p.cadCost), backgroundColor: '#bdc3c7', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 14, padding: 16, font: { size: 11 } } } },
                    scales: { y: { ticks: { callback: v => Math.round(v).toLocaleString('ru-RU') + ' ₽' } } }
                }
            });

            // ===== LEAFLET MAP (OpenStreetMap) =====
            const map = L.map('map').setView([58.480, 49.552], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);

            const markers = L.markerClusterGroup({
                disableClusteringAtZoom: 16,
                maxClusterRadius: 60
            });

            plots.forEach(p => {
                const color = priceColor(p.price);
                const pricePerSotka = Math.round(p.price / p.sot);

                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="
                        width:24px;height:24px;border-radius:50%;
                        background:${color};border:3px solid white;
                        box-shadow: 0 1px 6px rgba(0,0,0,0.4);
                        "></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12],
                    popupAnchor: [0, -14]
                });

                const marker = L.marker([p.lat, p.lng], { icon: icon });

                marker.bindPopup(`
                    <b>Участок №${p.id} — ${p.cad}</b><br><br>
                    <b>Цена:</b> ${p.price.toLocaleString('ru-RU')} ₽<br>
                    <b>Площадь:</b> ${p.sot} сот. (${p.area})<br>
                    <b>Цена/сотка:</b> ${pricePerSotka.toLocaleString('ru-RU')} ₽<br>
                    <b>Кад. стоимость:</b> ${p.cadCost.toLocaleString('ru-RU')} ₽<br>
                    <b>Адрес:</b> ${p.addr}<br>
                    <b>Дата КН:</b> ${p.date}<br><br>
                    <a href="${p.avito}" target="_blank">📋 Avito</a> &nbsp;
                    <a href="${p.pmap}" target="_blank">🗺️ Кадастровая карта</a>
                `, { maxWidth: 320 });

                markers.addLayer(marker);
            });

            map.addLayer(markers);
            if (plots.length > 0) {
                const bounds = markers.getBounds();
                if (bounds.isValid()) {
                    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
                }
            }
        }

        init();
    </script>
</body>

</html>
